<!DOCTYPE html>
<html>
<head>
    <title>Daily Tracking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>{{ habit.name }}</h2>

    <table class="table table-bordered">

        <tr>
            <th>Date</th>
            <th>Status</th>
        </tr>

        {% for log in logs %}

        <tr>

            <td>{{ log.log_date }}</td>

            <td>

                {% if log.completed %}

                    <span class="text-success">
                        ✅ Completed
                    </span>

                {% elif log.missed %}

                    <span class="text-danger">
                        ❌ Missed
                    </span>

                {% elif log.log_date == today %}

                    <a href="{% url 'mark_complete' log.id %}"
                       class="btn btn-success btn-sm">
                       Mark Complete
                    </a>

                {% else %}

                    <span class="text-secondary">
                        🔒 Locked
                    </span>

                {% endif %}

            </td>

        </tr>

        {% empty %}

        <tr>
            <td colspan="2" class="text-center">
                No records found
            </td>
        </tr>

        {% endfor %}

    </table>

    <a href="/habit-list/" class="btn btn-primary">
        Back
    </a>

</div>

</body>
</html>
