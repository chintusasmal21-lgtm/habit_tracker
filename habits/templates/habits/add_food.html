<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Food</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f5f5f5;">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>Add Food Item</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Food Name</label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Serving Size</label>

                        <input type="text"
                               name="serving_size"
                               class="form-control"
                               placeholder="100 g, 1 cup, 1 piece"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Food Type</label>

                        <select name="food_type"
                                class="form-control"
                                required>

                            <option value="">Select</option>

                            <option>Fruit</option>
                            <option>Vegetable</option>
                            <option>Grain</option>
                            <option>Protein</option>
                            <option>Dairy</option>
                            <option>Nut</option>
                            <option>Beverage</option>
                            <option>Snack</option>
                            <option>Fast Food</option>
                            <option>Dessert</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Meal Type</label>

                        <select name="meal_type"
                                class="form-control"
                                required>

                            <option value="">Select</option>

                            <option>Breakfast</option>
                            <option>Lunch</option>
                            <option>Dinner</option>
                            <option>Snack</option>
                            <option>Any</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Diet Type</label>

                        <select name="diet_type"
                                class="form-control"
                                required>

                            <option value="">Select</option>

                            <option>Veg</option>
                            <option>Non-Veg</option>
                            <option>Vegan</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Goal</label>

                        <select name="goal"
                                class="form-control"
                                required>

                            <option value="">Select</option>

                            <option>Weight Gain</option>
                            <option>Weight Loss</option>
                            <option>Maintain</option>

                        </select>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>Calories</label>

                        <input type="number"
                               name="calories"
                               class="form-control"
                               required>

                    </div>
                    <div class="mb-3">
                       <label class="form-label">
                          Health Score
                        </label>

                         <select name="health_score"
                           class="form-select"
                           required>

                        <option value="">Select Health Score</option>

                        <option value="5">
                             ⭐⭐⭐⭐⭐ Excellent
                        </option>

                        <option value="4">
                           ⭐⭐⭐⭐ Good
                        </option>

                        <option value="3">
                          ⭐⭐⭐ Average
                        </option>

                        <option value="2">
                          ⭐⭐ Poor
                        </option>

                        <option value="1">
                          ⭐ Avoid
                        </option>

                      </select>

                      </div>

                   

                </div>

                <button class="btn btn-success">
                    Save Food
                </button>

                <a href="{% url 'food_list' %}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
