<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f4f4ff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box{
            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            color: #001f8f;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .btn-login{
            background-color: #4a4aff;
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
        }

        .btn-login:hover{
            background-color: #3333ff;
        }

    </style>

</head>
    
<body>

    <div class="login-box">

        <h2>Admin</h2>

        <form method="POST" autocomplete="off">

            {% csrf_token %}

            <!-- Error Message -->

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <!-- Username -->

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username"
                       autocomplete="off">

            </div>

            <!-- Password -->

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password"
                       autocomplete="new-password">

            </div>

            <!-- Show Password -->

            <div class="form-check mb-3">

                <input class="form-check-input"
                       type="checkbox"
                       onclick="showPassword()">

                <label class="form-check-label">
                    Show Password
                </label>

            </div>

            <!-- Login Button -->

            <button type="submit"
                    class="btn btn-login">

                Login

            </button>

            
            

        </form>

    </div>

    <!-- JavaScript -->

    <script>

        function showPassword(){

            var x = document.getElementById("password");

            if(x.type === "password"){

                x.type = "text";

            }
            else{

                x.type = "password";

            }

        }

    </script>

</body>

</html>
