<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0d6efd,#4f46e5,#7c3aed);

}

.login-card{

width:420px;
background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:25px;

padding:40px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

color:white;

animation:fade .6s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

width:90px;
height:90px;

background:white;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

margin:auto;

color:#0d6efd;

font-size:40px;

margin-bottom:20px;

}

h2{

text-align:center;
font-weight:bold;

margin-bottom:5px;

}

.subtitle{

text-align:center;
margin-bottom:30px;
color:#eee;

}

.form-control{

height:55px;

border-radius:15px;

padding-left:45px;

border:none;

}

.input-group{

position:relative;

margin-bottom:20px;

}

.input-group i{

position:absolute;

left:18px;

top:18px;

color:#666;

z-index:10;

}

.form-check{

color:white;

}

.btn-login{

height:55px;

border-radius:15px;

font-size:18px;

font-weight:bold;

background:white;

color:#0d6efd;

border:none;

transition:.3s;

}

.btn-login:hover{

background:#ffd54f;

color:black;

transform:translateY(-2px);

}

.links{

display:flex;

justify-content:space-between;

margin-top:20px;

}

.links a{

color:white;

text-decoration:none;

font-size:15px;

}

.links a:hover{

text-decoration:underline;

}

.footer{

text-align:center;

margin-top:25px;

font-size:14px;

color:#eee;

}

@media(max-width:500px){

.login-card{

width:95%;
padding:30px 20px;

}

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<i class="fas fa-user-shield"></i>

</div>

<h2>Admin Login</h2>

<p class="subtitle">

Secure access to Habit Tracker Dashboard

</p>

<form method="POST">

{% csrf_token %}

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<div class="input-group">

<i class="fas fa-user"></i>

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>

<div class="input-group">

<i class="fas fa-lock"></i>

<input
type="password"
id="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
onclick="showPassword()">

<label class="form-check-label">

Show Password

</label>

</div>

<button class="btn btn-login w-100">

<i class="fas fa-sign-in-alt"></i>

Login

</button>

<div class="links">

<a href="/">

Back Home

</a>

</div>

</form>

<div class="footer">

© 2026 Dynamic Habit Tracker

</div>

</div>

<script>

function showPassword(){

var x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}else{

x.type="password";

}

}

</script>

</body>

</html>
