<!DOCTYPE html>
<html>
<head>

<title>Edit Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f4f6fb;
    font-family:'Segoe UI',sans-serif;
}

.edit-card{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.profile-pic{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #0d6efd;
}

.form-control{
    border-radius:12px;
    height:48px;
}

.form-label{
    font-weight:600;
}

.btn{
    border-radius:12px;
    padding:12px;
    font-weight:bold;
}

@media (max-width:768px){

    .edit-card{
        margin:20px;
        padding:20px;
    }

    .profile-pic{
        width:100px;
        height:100px;
    }

    h2{
        font-size:24px;
    }

    .form-control{
        height:45px;
        font-size:15px;
    }

    .btn{
        width:100%;
        margin-bottom:10px;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="edit-card">

<h2 class="text-center text-primary mb-4">
✏️ Edit Profile
</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="text-center mb-4">

<img src="{{ profile.profile_pic.url }}"
     class="profile-pic">

</div>

<div class="mb-3">

<label class="form-label">
Username
</label>

<input type="text"
       name="username"
       value="{{ request.user.username }}"
       class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Email
</label>

<input type="email"
       name="email"
       value="{{ request.user.email }}"
       class="form-control">

</div>

<div class="mb-4">

<label class="form-label">
Change Profile Picture
</label>

<input type="file"
       name="profile_pic"
       class="form-control">

</div>

<div class="d-grid gap-2">

<button type="submit"
        class="btn btn-success">

💾 Save Changes

</button>

<a href="{% url 'profile' %}"
   class="btn btn-secondary">

⬅ Back to Profile

</a>

</div>

</form>

</div>

</div>

</body>
</html>
