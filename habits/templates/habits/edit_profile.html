<!DOCTYPE html>
<html>
<head>

<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f4f6fb;
}

.edit-card{
    max-width:700px;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,.1);
}

.profile-pic{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #0d6efd;
}

</style>

</head>

<body>

<div class="edit-card">

<h2 class="text-center text-primary mb-4">
Edit Profile
</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="text-center mb-4">

<img src="{{ profile.profile_pic.url }}"
     class="profile-pic">

</div>

<div class="mb-3">

<label class="form-label">
Username
</label>

<input type="text"
       name="username"
       value="{{ request.user.username }}"
       class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Email
</label>

<input type="email"
       name="email"
       value="{{ request.user.email }}"
       class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Change Profile Picture
</label>

<input type="file"
       name="profile_pic"
       class="form-control">

</div>

<button type="submit"
        class="btn btn-success w-100">

Save Changes

</button>

</form>

<br>

<a href="/profile/"
   class="btn btn-secondary w-100">

Back To Profile

</a>

</div>

</body>
</html>
