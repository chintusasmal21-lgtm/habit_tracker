<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Language Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eef3ff;
}

.language-card{
    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    padding:30px;
}

.list-group-item{
    border:none;
    border-bottom:1px solid #eee;
    padding:18px;
    font-size:18px;
    font-weight:500;
}

.list-group-item:hover{
    background:#f5f7ff;
}

.active-lang{
    background:#0d6efd !important;
    color:white !important;
    border-radius:12px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="language-card">

<h2 class="text-center mb-4">
🌐 Language Selection
</h2>

<p class="text-center text-muted mb-4">
Choose your preferred language.
</p>

{% load i18n %}

<form action="{% url 'set_language' %}" method="post">
    {% csrf_token %}

    <input type="hidden" name="next" value="{{ request.path }}">

    <div class="list-group">

        <button class="list-group-item list-group-item-action" type="submit" name="language" value="en">
            🇬🇧 English
        </button>

        <button class="list-group-item list-group-item-action" type="submit" name="language" value="hi">
            🇮🇳 हिन्दी (Hindi)
        </button>

        <button class="list-group-item list-group-item-action" type="submit" name="language" value="kn">
            🇮🇳 ಕನ್ನಡ (Kannada)
        </button>

        <button class="list-group-item list-group-item-action" type="submit" name="language" value="bn">
            🇮🇳 বাংলা (Bengali)
        </button>

        <button class="list-group-item list-group-item-action" type="submit" name="language" value="te">
            🇮🇳 తెలుగు (Telugu)
        </button>

        <button class="list-group-item list-group-item-action" type="submit" name="language" value="ta">
            🇮🇳 தமிழ் (Tamil)
        </button>

    </div>

</form>

<div class="text-center mt-4">

<div class="alert alert-info">

🚀 Multi-language support will be available in a future update.

</div>

<a href="{% url 'profile' %}" class="btn btn-primary">

⬅ Back to Profile

</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
