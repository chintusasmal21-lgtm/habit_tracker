<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Food</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f5f5f5;">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Edit Food Item</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Food Name</label>
                        <input type="text"
                               name="name"
                               class="form-control"
                               value="{{ food.name }}"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Serving Size</label>
                        <input type="text"
                               name="serving_size"
                               class="form-control"
                               value="{{ food.serving_size }}"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Food Type</label>

                        <select name="food_type" class="form-control">

                            {% for value,label in food.FOOD_TYPES %}
                            <option value="{{ value }}"
                                {% if food.food_type == value %}selected{% endif %}>
                                {{ label }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Meal Type</label>

                        <select name="meal_type" class="form-control">

                            {% for value,label in food.MEAL_TYPES %}
                            <option value="{{ value }}"
                                {% if food.meal_type == value %}selected{% endif %}>
                                {{ label }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Diet Type</label>

                        <select name="diet_type" class="form-control">

                            {% for value,label in food.DIET_TYPES %}
                            <option value="{{ value }}"
                                {% if food.diet_type == value %}selected{% endif %}>
                                {{ label }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Goal</label>

                        <select name="goal" class="form-control">

                            {% for value,label in food.GOALS %}
                            <option value="{{ value }}"
                                {% if food.goal == value %}selected{% endif %}>
                                {{ label }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Calories</label>
                        <input type="number"
                               name="calories"
                               class="form-control"
                               value="{{ food.calories }}"
                               required>
                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Health Score
                         </label>

                        <select name="health_score"
                            class="form-select">

                            <option value="5"
                                 {% if food.health_score == 5 %}selected{% endif %}>
                                 ⭐⭐⭐⭐⭐ Excellent
                            </option>

                            <option value="4"
                                  {% if food.health_score == 4 %}selected{% endif %}>
                                  ⭐⭐⭐⭐ Good
                            </option>

                            <option value="3"
                                {% if food.health_score == 3 %}selected{% endif %}>
                                ⭐⭐⭐ Average
                            </option>

                            <option value="2"
                               {% if food.health_score == 2 %}selected{% endif %}>
                               ⭐⭐ Poor
                            </option>

                            <option value="1"
                               {% if food.health_score == 1 %}selected{% endif %}>
                                ⭐ Avoid
                            </option>

                        </select>

                    </div>
                </div>


               

                <button type="submit" class="btn btn-primary">
                    Update Food
                </button>

                <a href="{% url 'food_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
