<!DOCTYPE html>
<html>
<head>

<title>Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6fb;
}

.profile-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    margin-bottom:30px;
}

.profile-header{
    background:#0d6efd;
    color:white;
    padding:18px;
    text-align:center;
}

.profile-body{
    padding:30px;
}

.profile-pic{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #0d6efd;
}

.info-box h5{
    margin-bottom:18px;
    font-size:18px;
}

.action-btn{
    min-width:200px;
    margin:8px;
}

/* Mobile */

@media (max-width:768px){

    .profile-body{
        padding:20px;
    }

    .profile-pic{
        width:120px;
        height:120px;
        margin-bottom:20px;
    }

    .info-box{
        text-align:center;
    }

    .info-box h5{
        font-size:17px;
    }

    .action-btn{
        width:100%;
        margin:8px 0;
    }

}

</style>

</head>

<body>

<div class="container py-4">

<div class="profile-card">

<div class="profile-header">

<h2 class="mb-0">
👤 User Profile
</h2>

</div>

<div class="profile-body">

<div class="row align-items-center">

<div class="col-md-4 text-center mb-4 mb-md-0">

<img src="{{ profile.profile_pic.url }}"
     class="profile-pic">

</div>

<div class="col-md-8">

<div class="info-box">

<h5><b>Username:</b> {{ request.user.username }}</h5>

<h5><b>Email:</b> {{ request.user.email }}</h5>

<h5><b>Total Habits:</b> {{ total_habits }}</h5>

<h5><b>Completed Habits:</b> {{ completed_habits }}</h5>

</div>

</div>

</div>

<hr>

<div class="text-center">

<a href="{% url 'edit_profile' %}"
   class="btn btn-primary action-btn">

✏️ Edit Profile

</a>

<a href="{% url 'change_password' %}"
   class="btn btn-warning action-btn">

🔒 Change Password

</a>

<a href="{% url 'dashboard' %}"
    class="btn btn-secondary action-btn">

    ⬅ Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</body>
</html>
