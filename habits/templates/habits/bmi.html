<!DOCTYPE html>
<html>
<head>

    <title>BMI Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#eef2ff,#dce7ff,#f7f9ff);
            font-family:Arial,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
        }

        .card{
            width:750px;
            border:none;
            border-radius:25px;
            padding:40px;
            box-shadow:0 12px 30px rgba(0,0,0,.15);
        }

        .heading{
            font-size:40px;
            font-weight:bold;
            color:#0d6efd;
            text-align:center;
            margin-bottom:30px;
        }

        label{
            font-size:18px;
            font-weight:bold;
        }

        .form-control{
            height:55px;
            border-radius:15px;
            font-size:18px;
        }

        .gender-box{

            border:2px solid #ddd;
            border-radius:15px;
            text-align:center;
            padding:20px;
            cursor:pointer;
            transition:.3s;

        }

        .gender-box:hover{

            border-color:#0d6efd;
            transform:scale(1.03);

        }

        .gender-box input{

            display:none;

        }

        .gender-box .icon{

            font-size:60px;

        }

        .gender-box .text{

            font-size:22px;
            font-weight:bold;

        }

        .btn-primary{

            width:100%;
            height:60px;
            font-size:22px;
            border-radius:15px;
            margin-top:20px;

        }

        .circle{

            width:170px;
            height:170px;
            border-radius:50%;
            background:#0d6efd;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
            font-weight:bold;
            margin:30px auto;

        }

        .status{

            text-align:center;
            font-size:28px;
            font-weight:bold;
            margin-bottom:20px;

        }

    </style>

</head>

<body>

<div class="card">

<h2 class="heading">

🧮 BMI Calculator

</h2>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6">

<label>Age</label>

<input
type="number"
name="age"
class="form-control"
placeholder="Enter Age"
required>

</div>

<div class="col-md-6">

<label>Gender</label>

<div class="row mt-2">

<div class="col-6">

<label class="gender-box">

<input
type="radio"
name="gender"
value="Male"
required>

<div class="icon">👨</div>

<div class="text">Male</div>

</label>

</div>

<div class="col-6">

<label class="gender-box">

<input
type="radio"
name="gender"
value="Female">

<div class="icon">👩</div>

<div class="text">Female</div>

</label>

</div>

</div>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Height (cm)</label>

<input
type="number"
step="0.1"
name="height"
class="form-control"
placeholder="Enter Height"
required>

</div>

<div class="col-md-6">

<label>Weight (kg)</label>

<input
type="number"
step="0.1"
name="weight"
class="form-control"
placeholder="Enter Weight"
required>

</div>

</div>

<button class="btn btn-primary">

Calculate BMI

</button>

</form>

{% if bmi %}

<hr>

<div class="circle">

{{ bmi }}

</div>

<div class="status">

{{ status }}

</div>

<div class="row">

<div class="col-md-6">

<p><strong>Age:</strong> {{ age }}</p>

<p><strong>Gender:</strong> {{ gender }}</p>

</div>

<div class="col-md-6">

<p><strong>Height:</strong> {{ height }} cm</p>

<p><strong>Weight:</strong> {{ weight }} kg</p>

</div>

</div>

<h4 class="mt-4">

Health Tips

</h4>

<ul class="list-group">

{% for tip in tips %}

<li class="list-group-item">

{{ tip }}

</li>

{% endfor %}

</ul>

{% endif %}

</div>

</body>
</html>
