{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Verify OTP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-image:url("{% static 'image/log.jpg' %}");
    background-size:cover;
    background-position:center;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.otp-box{

    width:450px;

    background:white;

    padding:35px;

    border-radius:20px;

    box-shadow:0 0 20px rgba(0,0,0,.2);
}

</style>

</head>

<body>

<div class="otp-box">

    <h2 class="text-center text-primary">
        Verify OTP
    </h2>

    <p class="text-center text-muted">

        Enter the OTP sent to your email

    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>OTP</label>

            <input type="text"
                   name="otp"
                   class="form-control"
                   placeholder="Enter OTP"
                   required>

        </div>

        <button type="submit"
                class="btn btn-primary w-100">

            Verify OTP

        </button>

    </form>

</div>

</body>
</html>
