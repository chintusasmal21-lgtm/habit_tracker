{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Verify OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Arial,sans-serif;
}


/* =========================
   BODY
========================= */

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    background-image:url("{% static 'image/log.jpg' %}");

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;

    position:relative;

}


/* Background Overlay */

body::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.40);

    backdrop-filter:blur(4px);

}


/* =========================
   OTP BOX
========================= */

.otp-box{

    position:relative;

    z-index:2;

    width:100%;

    max-width:450px;

    padding:40px 35px;

    border-radius:25px;

    background:rgba(255,255,255,.95);

    box-shadow:0 20px 50px rgba(0,0,0,.35);

    animation:fadeIn .6s ease;

}


/* Animation */

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(30px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}


/* =========================
   OTP ICON
========================= */

.otp-icon{

    width:80px;

    height:80px;

    margin:0 auto 20px;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    color:white;

    font-size:35px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #06b6d4
    );

    box-shadow:
        0 10px 25px
        rgba(37,99,235,.35);

}


/* =========================
   TITLE
========================= */

.otp-box h2{

    text-align:center;

    color:#0b2d8f;

    font-weight:700;

    margin-bottom:10px;

}


/* Description */

.description{

    text-align:center;

    color:#666;

    margin-bottom:25px;

}


/* =========================
   ERROR
========================= */

.alert{

    border-radius:12px;

    font-size:14px;

}


/* =========================
   OTP INPUT
========================= */

.form-label{

    font-weight:600;

    color:#333;

}


.otp-input{

    height:60px;

    border-radius:15px;

    text-align:center;

    font-size:25px;

    font-weight:bold;

    letter-spacing:10px;

    border:2px solid #ddd;

}


.otp-input:focus{

    border-color:#2563eb;

    box-shadow:
        0 0 12px
        rgba(37,99,235,.25);

}


/* =========================
   BUTTON
========================= */

.btn-verify{

    width:100%;

    height:52px;

    border:none;

    border-radius:30px;

    color:white;

    font-size:17px;

    font-weight:bold;

    background:
        linear-gradient(
            90deg,
            #06b6d4,
            #2563eb
        );

    transition:.3s;

}


.btn-verify:hover{

    transform:translateY(-2px);

    box-shadow:
        0 10px 20px
        rgba(37,99,235,.35);

}


/* =========================
   BACK LINK
========================= */

.back-link{

    text-align:center;

    margin-top:20px;

}


.back-link a{

    text-decoration:none;

    color:#2563eb;

    font-weight:600;

}


.back-link a:hover{

    color:#06b6d4;

}


/* =========================
   MOBILE
========================= */

@media(max-width:576px){

    .otp-box{

        padding:30px 20px;

        border-radius:20px;

    }


    .otp-icon{

        width:70px;

        height:70px;

        font-size:30px;

    }


    .otp-box h2{

        font-size:26px;

    }


    .description{

        font-size:14px;

    }


    .otp-input{

        height:55px;

        font-size:22px;

    }

}

</style>

</head>


<body>


<div class="otp-box">


    <!-- Icon -->

    <div class="otp-icon">

        <i class="fas fa-shield-halved"></i>

    </div>


    <!-- Title -->

    <h2>
        Verify OTP
    </h2>


    <p class="description">

        Enter the 6-digit OTP sent to your registered email address.

    </p>


    <!-- Error Message -->

    {% if error %}

    <div class="alert alert-danger text-center">

        {{ error }}

    </div>

    {% endif %}


    <!-- OTP Form -->

    <form method="POST">

        {% csrf_token %}


        <div class="mb-4">

            <label class="form-label">

                Enter OTP

            </label>


            <input type="text"

                   name="otp"

                   class="form-control otp-input"

                   placeholder="000000"

                   maxlength="6"

                   minlength="6"

                   pattern="[0-9]{6}"

                   inputmode="numeric"

                   autocomplete="one-time-code"

                   required>

        </div>


        <!-- Verify Button -->

        <button type="submit"
                class="btn-verify">

            <i class="fas fa-check-circle"></i>

            Verify OTP

        </button>


    </form>


    <!-- Back -->

    <div class="back-link">

        <a href="{% url 'forgot_password' %}">

            ← Back to Forgot Password

        </a>

    </div>


</div>


</body>

</html>
