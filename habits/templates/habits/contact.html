<!DOCTYPE html>
<html>
<head>

<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f4f6fb;
}

.contact-box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

.heading{
    color:#0d6efd;
    font-weight:bold;
}

</style>

</head>

<body>
      {% include 'habits/navbar.html' %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="contact-box">

<h1 class="heading text-center mb-4">
Contact Us
</h1>

{% if messages %}

{% for message in messages %}

<div class="alert alert-success">

{{ message }}

</div>

{% endfor %}

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<input type="text"
       name="name"
       class="form-control"
       required>

</div>

<div class="mb-3">

<label class="form-label">

Email

</label>

<input type="email"
       name="email"
       class="form-control"
       required>

</div>

<div class="mb-3">

<label class="form-label">

Subject

</label>

<input type="text"
       name="subject"
       class="form-control"
       required>

</div>

<div class="mb-3">

<label class="form-label">

Message

</label>

<textarea
          name="message"
          rows="5"
          class="form-control"
          required></textarea>

</div>

<button type="submit"
        class="btn btn-primary w-100">

Send Message

</button>

</form>

<hr>

<div class="text-center mt-4">

<h5>Contact Information</h5>

<p>📧 Email: support@habittracker.com</p>

<p>📱 Phone: +91 9641019378</p>

<p>📍 Location: Karnataka, India</p>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
