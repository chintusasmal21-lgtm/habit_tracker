{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-image: url("{% static 'image/log.jpg' %}");
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-box{
            width: 420px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(56, 120, 29, 0.1);
        }

        h2{ 
            text-align: center;
            color: rgb(4, 177, 13);
            margin-bottom: 25px;
            font-weight: bold;
        }

        .btn-register{
            background: linear-gradient(90deg,#06b6d4,#3b82f6);
            color: white;
            border: none;
            border-radius: 50px;
            width: 100%;
            padding: 10px;
            border: none;
            transition: .3s;
        }

        .btn-register:hover{
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,162,255,.4);
            color: white;
        }
        .btn-outline-light{
          border-radius: 50px;
          padding: 12px;
          font-weight: 600;
        }

        .btn-outline-light:hover{
           background: white;
           color: #2563eb;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h2>Register</h2>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                   {{ message }}
                </div>
           {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <!-- Username -->

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username"
                       autocomplete="off"
                       required>

            </div>

            <!-- Email -->

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter email"
                       required>

            </div>

            <!-- Phone -->

            <div class="mb-3">

                <label class="form-label">
                    Phone Number
                </label>

                <input type="text"
                       name="phone"
                       class="form-control"
                       placeholder="Enter phone number"
                       pattern="[0-9]{10}"
                       maxlength="10"
                       required>
                       

            </div>

            <!-- Gender -->

            <div class="mb-3">

                <label class="form-label">
                    Gender
                </label>

                <select name="gender"
                        class="form-control"
                        required>

                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>

                </select>

            </div>

            <!-- Password -->

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password"
                       autocomplete="new-password"
                       minlength="8"
                       required>

            </div>

            <!-- Show Password -->

            <div class="form-check mb-3">

                <input class="form-check-input"
                       type="checkbox"
                       onclick="showPassword()">

                <label class="form-check-label">
                    Show Password
                </label>

            </div>

            <!-- Button -->

            <button type="submit"
                    class="btn btn-register  w-100 mb-3">

                Register

            </button>
             <a href="/login/"class="btn btn-outline-light w-100">

               ← Back to Login

            </a>

        </form>

    </div>

    <!-- JavaScript -->

    <script>

        function showPassword(){

            var x = document.getElementById("password");

            if(x.type === "password"){

                x.type = "text";

            }
            else{

                x.type = "password";

            }

        }

    </script>

</body>

</html>
