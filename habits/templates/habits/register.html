{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

 <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    background:url("{% static 'image/log.jpg' %}") center center/cover no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    position:relative;

}

body::before{

    content:"";

    position:absolute;

    inset:0;

    background:rgba(0,0,0,.45);

    backdrop-filter:blur(6px);

}

.register-box{

    position:relative;

    width:100%;
    max-width:500px;

    padding:45px;

    border-radius:28px;

    background:rgba(255,255,255,.16);

    border:1px solid rgba(255,255,255,.2);

    backdrop-filter:blur(20px);

    box-shadow:0 25px 50px rgba(0,0,0,.35);

    animation:fadeIn .8s ease;

    z-index:10;

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(30px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

h2{

    color:white;

    text-align:center;

    font-size:36px;

    font-weight:bold;

    margin-bottom:30px;

}

.form-label{

    color:white;

    font-weight:600;

    margin-bottom:8px;

}

.form-control,
.form-select{

    height:52px;

    border:none;

    border-radius:15px;

    background:rgba(255,255,255,.92);

    padding:12px 18px;

    transition:.3s;

}

.form-control:focus,
.form-select:focus{

    transform:scale(1.02);

    box-shadow:0 0 15px rgba(37,99,235,.4);

    border:none;

}

.form-check{

    margin-top:5px;

}

.form-check-label{

    color:white;

}

.btn-register{

    width:100%;

    height:55px;

    border:none;

    border-radius:50px;

    background:linear-gradient(90deg,#06b6d4,#2563eb);

    color:white;

    font-size:18px;

    font-weight:600;

    transition:.35s;

}

.btn-register:hover{

    transform:translateY(-4px);

    box-shadow:0 15px 30px rgba(37,99,235,.45);

}

.btn-outline-light{

    width:100%;

    height:55px;

    margin-top:15px;

    border-radius:50px;

    border:2px solid rgba(255,255,255,.7);

    color:white;

    font-weight:600;

    transition:.35s;

}

.btn-outline-light:hover{

    background:white;

    color:#2563eb;

    border-color:white;

}

.alert{

    border-radius:15px;

}

::placeholder{

    color:#888;

}

@media(max-width:576px){

    .register-box{

        padding:30px 22px;

    }

    h2{

        font-size:30px;

    }

}

</style>

</head>

<body>

    <div class="register-box">

        <h2>Register</h2>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                   {{ message }}
                </div>
           {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <!-- Username -->

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username"
                       autocomplete="off"
                       required>

            </div>

            <!-- Email -->

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter email"
                       required>

            </div>

            <!-- Phone -->

            <div class="mb-3">

                <label class="form-label">
                    Phone Number
                </label>

                <input type="text"
                       name="phone"
                       class="form-control"
                       placeholder="Enter phone number"
                       pattern="[0-9]{10}"
                       maxlength="10"
                       required>
                       

            </div>

            <!-- Gender -->

            <div class="mb-3">

                <label class="form-label">
                    Gender
                </label>

                <select name="gender"
                        class="form-control"
                        required>

                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>

                </select>

            </div>

            <!-- Password -->

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password"
                       autocomplete="new-password"
                       minlength="8"
                       required>

            </div>

            <!-- Show Password -->

            <div class="form-check mb-3">

                <input class="form-check-input"
                       type="checkbox"
                       onclick="showPassword()">

                <label class="form-check-label">
                    Show Password
                </label>

            </div>

            <!-- Button -->

            <button type="submit"
                    class="btn btn-register  w-100 mb-3">

                Register

            </button>
             <a href="/login/"class="btn btn-outline-light w-100">

               ← Back to Login

            </a>

        </form>

    </div>

    <!-- JavaScript -->

    <script>

        function showPassword(){

            var x = document.getElementById("password");

            if(x.type === "password"){

                x.type = "text";

            }
            else{

                x.type = "password";

            }

        }

    </script>

</body>

</html>
