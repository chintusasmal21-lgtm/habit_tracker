{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background-image: url("{% static 'image/log.jpg' %}");
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-box{
            width: 420px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(56, 120, 29, 0.1);
        }

        h2{ 
            text-align: center;
            color: rgb(4, 177, 13);
            margin-bottom: 25px;
            font-weight: bold;
        }

        .btn-register{
            background-color: #4a4aff;
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
        }

        .btn-register:hover{
            background-color: #3333ff;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h2>Register</h2>

        <form method="POST">

            {% csrf_token %}

            <!-- Username -->
             <div class="mb-3">

               <label class="form-label">Username</label>

               <div class="input-group">
                <span class="input-group-text">
                <i class="bi bi-person-fill"></i>
                </span>
                <input
                  type="text"
                  name="username"
                  class="form-control"
                  placeholder="Enter username"
                  required>

                </div>

             </div>

            

            <!-- Email -->  

            <div class="mb-3">
               <label>Email</label>

             <div class="input-group">

                <span class="input-group-text">
                 <i class="bi bi-envelope-fill"></i>
                </span>

               <input
                 type="email"
                 name="email"lass="form-control"
                 placeholder="Enter email"
                required>

             </div>

            </div>

            <!-- Phone -->
             <div class="mb-3">

              <label>Phone Number</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-telephone-fill"></i>
</span>

<input
type="text"
name="phone"
class="form-control"
placeholder="10-digit mobile number"
maxlength="10"
pattern="[0-9]{10}"
required>

</div>

</div>

            

            <!-- Gender -->

           <div class="mb-3">

<label>Gender</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-person-badge-fill"></i>
</span>

<select
name="gender"
class="form-control"
required>

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

</div>

</div>

            <!-- Password -->

           <div class="mb-3">

<label>Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input
type="password"
id="password"
name="password"
class="form-control"
placeholder="Create password"
required>

<button
type="button"
class="input-group-text"
onclick="showPassword()">

<i
id="eyeIcon"
class="bi bi-eye-fill"></i>

</button>

</div>

<div class="progress mt-2">

<div
id="strengthBar"
class="progress-bar"
style="width:0%">

</div>

</div>

<small id="strengthText">

Password Strength

</small>

</div>

            <!-- Show Password -->

            <div class="form-check mb-3">

                <input class="form-check-input"
                       type="checkbox"
                       onclick="showPassword()">

                <label class="form-check-label">
                    Show Password
                </label>

            </div>

            <!-- Button -->

           <button
              type="submit"
              class="btn btn-register">

               Create Account

           </button>

          <a
             href="/login/"
             class="btn btn-home mt-3">

            ← Back to Login

          </a>
        </form>

    </div>

    <!-- JavaScript -->

    <script>
        const password =
document.getElementById("password");

password.addEventListener("keyup", function(){

let value=password.value.length;

let bar=document.getElementById("strengthBar");

let text=document.getElementById("strengthText");

if(value<6){

bar.style.width="30%";
bar.className="progress-bar bg-danger";
text.innerHTML="Weak Password";

}
else if(value<10){

bar.style.width="70%";
bar.className="progress-bar bg-warning";
text.innerHTML="Medium Password";

}
else{

bar.style.width="100%";
bar.className="progress-bar bg-success";
text.innerHTML="Strong Password";

}

});
        function showPassword(){

let pass=document.getElementById("password");

let eye=document.getElementById("eyeIcon");

if(pass.type==="password"){

pass.type="text";

eye.className="bi bi-eye-slash-fill";

}
else{

pass.type="password";

eye.className="bi bi-eye-fill";

}

}

        

    </script>

</body>

</html>
