{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>
  

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

     *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
     }

body{

    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
    url("{% static 'image/log.jpg' %}");

    background-size:cover;
    background-position:center;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.circle{

    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    animation:float 8s infinite ease-in-out;
}

.c1{
    width:220px;
    height:220px;
    top:-70px;
    left:-70px;
}

.c2{
    width:180px;
    height:180px;
    right:40px;
    bottom:40px;
    animation-delay:2s;
}

.c3{
    width:100px;
    height:100px;
    top:25%;
    right:28%;
    animation-delay:4s;
}

@keyframes float{

50%{
transform:translateY(-20px);
}

}

.login-box{

    width:430px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.25);

    border-radius:20px;

    padding:35px;

    color:white;

    box-shadow:0 20px 45px rgba(0,0,0,.35);

    animation:fade .8s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.login-box h2{

font-weight:bold;
text-align:center;
margin-bottom:10px;
color:white;

}

.subtitle{

text-align:center;
margin-bottom:30px;
opacity:.9;

}

.form-label{

font-weight:600;

}

.input-group-text{

background:rgba(255,255,255,.18);
border:none;
color:white;

}

.form-control{

background:rgba(255,255,255,.15);
border:none;
color:white;
padding:12px;

}

.form-control::placeholder{

color:#ddd;

}

.form-control:focus{

background:rgba(255,255,255,.2);
color:white;
box-shadow:none;

}

.btn-login{

width:100%;
padding:12px;

background:linear-gradient(90deg,#3b82f6,#06b6d4);

border:none;

border-radius:50px;

font-weight:bold;

transition:.3s;

}

.btn-login:hover{

transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,150,255,.4);

}

.btn-home{

width:100%;
margin-top:12px;
border-radius:50px;

border:1px solid white;
color:white;

}

.btn-home:hover{

background:white;
color:#0d6efd;

}

a{

color:#fff;
font-weight:500;

}

a:hover{

color:#ffd54f;

}

.eye-btn{

cursor:pointer;

background:rgba(255,255,255,.18);

border:none;

color:white;

}

.form-check-label{

color:white;

}

</style>

</head>

<body>
    <h2>Welcome Back 👋</h2>

<p class="subtitle">
Login to continue your healthy journey.
</p>
      
  
   <div class="mb-3">

<label class="form-label">Username</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter username"
required>

</div>

</div>

            <!-- Password -->

            <div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
id="password"
name="password"
class="form-control"
placeholder="Enter password"
required>

<button
type="button"
class="input-group-text eye-btn"
onclick="showPassword()">

<i id="eyeIcon"
class="bi bi-eye-fill"></i>

</button>

</div>

</div>

            <!-- Show Password -->

<div class="d-flex justify-content-between mb-4">

<div class="form-check">

<input
class="form-check-input"
type="checkbox">

<label class="form-check-label">

Remember Me

</label>

</div>

<a href="/forgot-password/">

Forgot Password?

</a>

</div>

            <!-- Login Button -->

            <button type="submit"
                    class="btn btn-login">

                Login

            </button>

            <br>
            <div>

            <a href="/"
                class="btn btn-home">

                ← Back to Home

            </a>
            </div>

            <!-- Register Link -->

            <p class="mt-4 text-center">

                Don't have an account?

                <a href="/register/">
                    Register here
                </a>

            </p>

        </form>

    </div>

    <!-- JavaScript -->

    <script>

        function validateForm(){

    let username =
        document.querySelector('[name="username"]').value;

    let password =
        document.querySelector('[name="password"]').value;

    if(username.trim() === ""){

        alert("Username is required");
        return false;
    }

    if(password.trim() === ""){

        alert("Password is required");
        return false;
    }

    return true;
}

function showPassword(){

let pass=document.getElementById("password");

let icon=document.getElementById("eyeIcon");

if(pass.type==="password"){

pass.type="text";

icon.className="bi bi-eye-slash-fill";

}
else{

pass.type="password";

icon.className="bi bi-eye-fill";

}

}

    </script>


</body>

</html>
