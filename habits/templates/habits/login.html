{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>
  

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

      body{
          margin:0;
          padding:0;

          background-image: url("{% static 'image/log.jpg' %}");
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
 
          height:100vh;

          display:flex;
          justify-content:center;
          align-items:center;
        }

        .login-box{
          width:420px;

          background: rgba(255,255,255,0.9);

          padding:35px;

          border-radius:15px;

          box-shadow:0px 0px 20px rgba(0,0,0,0.3);

          backdrop-filter: blur(5px);
        }
        body{
           background-image:url("{% static 'image/log.jpg' %}");
           background-size:cover;
           background-position:center;
           height:100vh;

           display:flex;
           justify-content:center;
           align-items:center;
        }

        h2{
            text-align: center;
            color: #001f8f;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .btn-login{
            background-color: #4a4aff;
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
        }

        .btn-login:hover{
            background-color: #3333ff;
        }

    </style>

</head>

<body>
      
  
    <div class="login-box">

        <h2>Login</h2>

        <form method="POST" autocomplete="off"
         novalidate
         onsubmit="return validateForm()">

            {% csrf_token %}

            <!-- Error Message -->

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <!-- Username -->

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username"
                       autocomplete="off"
                       required>


            </div>

            <!-- Password -->

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password"
                       autocomplete="new-password"
                       required>


            </div>

            <!-- Show Password -->

            <div class="d-flex justify-content-between align-items-center mb-3">

                <div class="form-check">

                   <input class="form-check-input"
                       type="checkbox"
                       onclick="showPassword()">

                   <label class="form-check-label">
                      Show Password
                   </label>

                </div>

                 <a href="/forgot-password/"
                   class="text-decoration-none">

                    Forgot Password

                 </a>

            </div>

            <!-- Login Button -->

            <button type="submit"
                    class="btn btn-login">

                Login

            </button>

            <br>
            <div>

            <a href="/"
                class="btn btn-home">

                ← Back to Home

            </a>
            </div>

            <!-- Register Link -->

            <p class="mt-4 text-center">

                Don't have an account?

                <a href="/register/">
                    Register here
                </a>

            </p>

        </form>

    </div>

    <!-- JavaScript -->

    <script>

        function validateForm(){

    let username =
        document.querySelector('[name="username"]').value;

    let password =
        document.querySelector('[name="password"]').value;

    if(username.trim() === ""){

        alert("Username is required");
        return false;
    }

    if(password.trim() === ""){

        alert("Password is required");
        return false;
    }

    return true;
}

function showPassword(){

    var x = document.getElementById("password");

    if(x.type === "password"){

        x.type = "text";

    }else{

        x.type = "password";

    }
}

    </script>


</body>

</html>
