<!DOCTYPE html>
<html>
<head>

<title>Change Password</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f4f6fb;
    font-family:'Segoe UI',sans-serif;
}

.password-card{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.form-label{
    font-weight:600;
}

.form-control{
    height:48px;
    border-radius:12px;
}

.btn{
    border-radius:12px;
    padding:12px;
    font-weight:bold;
}

@media (max-width:768px){

    .password-card{
        margin:20px;
        padding:20px;
    }

    h2{
        font-size:24px;
    }

    .form-control{
        height:45px;
        font-size:15px;
    }

    .btn{
        width:100%;
        margin-bottom:10px;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="password-card">

<h2 class="text-center text-primary mb-4">
🔒 Change Password
</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Current Password
</label>

<input
type="password"
name="old_password"
class="form-control"
placeholder="Enter current password"
required>

</div>

<div class="mb-3">

<label class="form-label">
New Password
</label>

<input
type="password"
name="new_password"
class="form-control"
placeholder="Enter new password"
required>

</div>

<div class="mb-4">

<label class="form-label">
Confirm Password
</label>

<input
type="password"
name="confirm_password"
class="form-control"
placeholder="Confirm new password"
required>

</div>

<div class="d-grid gap-2">

<button
type="submit"
class="btn btn-success">

🔄 Update Password

</button>

<a href="{% url 'profile' %}"
class="btn btn-secondary">

⬅ Back To Profile

</a>

</div>

</form>

</div>

</div>

</body>
</html>
