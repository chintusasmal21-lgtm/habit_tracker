<!DOCTYPE html>
<html>
<head>

<title>Change Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f4f6fb;
}

.password-card{
    max-width:600px;
    margin:auto;
    margin-top:70px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="password-card">

<h2 class="text-center text-primary mb-4">
Change Password
</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Current Password
</label>

<input type="password"
       name="old_password"
       class="form-control"
       required>

</div>

<div class="mb-3">

<label class="form-label">
New Password
</label>

<input type="password"
       name="new_password"
       class="form-control"
       required>

</div>

<div class="mb-3">

<label class="form-label">
Confirm Password
</label>

<input type="password"
       name="confirm_password"
       class="form-control"
       required>

</div>

<button type="submit"
        class="btn btn-success w-100">

Update Password

</button>

</form>

<br>

<a href="{% url 'profile' %}"
   class="btn btn-secondary w-100">

Back To Profile

</a>

</div>

</body>
</html>
