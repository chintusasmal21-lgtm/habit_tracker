{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-image:url("{% static 'image/log.jpg' %}");
    background-size:cover;
    background-position:center;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.reset-box{

    width:500px;

    background:rgba(255,255,255,0.95);

    padding:40px;

    border-radius:20px;

    box-shadow:0 0 25px rgba(0,0,0,.25);
}

</style>

</head>

<body>

<div class="reset-box">

    <h2 class="text-center text-success mb-4">
        Reset Password
    </h2>

    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>New Password</label>

            <input type="password"
                   name="password"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Confirm Password</label>

            <input type="password"
                   name="confirm_password"
                   class="form-control"
                   required>

        </div>

        <button type="submit"
                class="btn btn-success w-100">

            Reset Password

        </button>

    </form>

</div>

</body>
</html>
