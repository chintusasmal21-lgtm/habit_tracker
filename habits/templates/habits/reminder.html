<!DOCTYPE html>
<html>

<head>

<title>Habit Reminders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">
🔔 Today's Pending Reminders
</h2>

{% if pending_reminders %}

<div class="list-group">

{% for habit in pending_reminders %}

<div class="list-group-item">

<h5>{{ habit.name }}</h5>

<p>

Category :
{{ habit.category }}

</p>

<p>

Reminder :
{{ habit.reminder_time|time:"h:i A" }}

</p>

<span class="badge bg-danger">

Pending

</span>

</div>

{% endfor %}

</div>

{% else %}

<div class="alert alert-success">

🎉 No pending reminders today.

</div>

{% endif %}

<a href="{% url 'dashboard' %}" class="btn btn-primary mt-4">

⬅ Back to Dashboard

</a>

</div>

</body>

</html>
