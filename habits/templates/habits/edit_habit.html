<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>edit_habit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background:#f4f4ff;
    }

    .main-box{
        background:white;
        margin:30px auto;
        padding:30px;
        border-radius:15px;
        box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    }

        color:#001f8f;
        font-weight:bold;
        margin-bottom:25px;
    }

    .habit-card{
        background:#eef0ff;
        border-radius:10px;
        padding:20px;
        margin-bottom:20px;
    }

    .habit-name{
        font-size:28px;
        font-weight:bold;
        color:#333;
    }

    .habit-desc{
        color:#666;
        font-size:18px;
    }

    .status-completed{
        color:green;
        font-weight:bold;
        font-size:20px;
    }

    .status-pending{
        color:orange;
        font-weight:bold;
        font-size:20px;
    }

</style>
```

```
<div class="main-box">


    {% for habit in habits %}

    <div class="habit-card">

        <div class="habit-name">
            {{ habit.name }}
        </div>

        <div class="habit-desc">
            {{ habit.description }}
        </div>

        <br>

        <a href="{% url 'habit_edits' habit.id %}"
           class="btn btn-primary">
          Edit
        </a>

        <a href="/delete-habit/{{ habit.id }}/"
           class="btn btn-danger ms-2"
           onclick="return confirm('Are you sure you want to delete this habit?')">

            Delete
        </a>
      

    </div>

    {% empty %}

    

    {% endfor %}
      <a href="{% url 'dashboard' %}"
       class="btn btn-secondary">

       Back

    </a>

</div>
```
