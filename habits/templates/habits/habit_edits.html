<!DOCTYPE html>
<html>
<head>
    <title>Edit Habit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2>Edit Habit</h2>

       <form method="POST">

    {% csrf_token %}

    <!-- Habit Name -->
    <label class="form-label">Habit Name</label>
    <input type="text"
           name="habit_name"
           value="{{ habit.name }}"
           class="form-control mb-3"
           readonly>

    <!-- Description -->
    <label class="form-label">Description</label>
    <textarea name="description"
              class="form-control mb-3"
              rows="3">{{ habit.description }}</textarea>

    <!-- Category -->
    <label class="form-label">Category</label>
    <select name="category" class="form-control mb-3">

        <option value="Health"
            {% if habit.category == "Health" %}selected{% endif %}>
            ❤️ Health
        </option>

        <option value="Fitness"
            {% if habit.category == "Fitness" %}selected{% endif %}>
            💪 Fitness
        </option>

        <option value="Study"
            {% if habit.category == "Study" %}selected{% endif %}>
            📚 Study
        </option>

        <option value="Work"
            {% if habit.category == "Work" %}selected{% endif %}>
            💼 Work
        </option>

        <option value="Personal"
            {% if habit.category == "Personal" %}selected{% endif %}>
            🌱 Personal
        </option>

    </select>

    <!-- Frequency -->
    <label class="form-label">Frequency</label>
    <select name="frequency" class="form-control mb-3">

        <option value="Daily"
            {% if habit.frequency == "Daily" %}selected{% endif %}>
            Daily
        </option>

        <option value="Weekdays"
           {% if habit.frequency == "Weekdays" %}selected{% endif %}>
            Weekdays
        </option>

        <option value="Weekends"
           {% if habit.frequency == "Weekends" %}selected{% endif %}>
            Weekends
        </option>

        <option value="Weekly"
          {% if habit.frequency == "Weekly" %}selected{% endif %}>
           Weekly
        </option>

       

    </select>

    <!-- Reminder -->
    <label class="form-label">Reminder Time</label>
    <input type="time"
           name="reminder_time"
           value="{{ habit.reminder_time|time:'H:i' }}"
           class="form-control mb-3">

    <!-- Start Date -->
    <label class="form-label">Start Date</label>
    <input type="date"
           value="{{ habit.start_date|date:'Y-m-d' }}"
           class="form-control mb-3"
           readonly>

    <!-- End Date -->
    <label class="form-label">End Date</label>
    <input type="date"
           name="end_date"
           value="{{ habit.end_date|date:'Y-m-d' }}"
           class="form-control mb-3">

    <!-- Status -->
    <label class="form-label">Status</label>
    <input type="text"
           value="{{ habit.status }}"
           class="form-control mb-3"
           readonly>

    <div class="text-center mt-4">

        <button type="submit" class="btn btn-success">
            ✅ Update Habit
        </button>

        <a href="{% url 'dashboard' %}" class="btn btn-secondary">
            Cancel
        </a>

    </div>

</form>

    </div>

</div>

</body>
</html>
