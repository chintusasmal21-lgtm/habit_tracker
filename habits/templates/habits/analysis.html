<!DOCTYPE html>
<html>

<head>

<title>Overall Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:linear-gradient(135deg,#d4fc79,#96e6a1);
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
}

.container{
    margin-top:40px;
}

h1{
    text-align:center;
    font-size:45px;
    font-weight:bold;
    color:#1f2937;
    margin-bottom:35px;
}

/* Cards */

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
}

/* Statistic Cards */

.total-card{
    background:#dbeafe;
}

.completed-card{
    background:#dcfce7;
}

.pending-card{
    background:#fef9c3;
}

.missed-card{
    background:#fee2e2;
}

.card h5{
    font-weight:bold;
    color:#555;
}

.card h2{
    font-size:40px;
    font-weight:bold;
}

/* Chart Cards */

.chart-card{
    background:#ffffff;
    margin-bottom:25px;
}

.chart-card h4{
    font-weight:bold;
    margin-bottom:20px;
}

/* Progress */

.progress{
    height:30px;
    border-radius:20px;
}

.progress-bar{
    font-size:18px;
    font-weight:bold;
}

/* Charts */

canvas{
    max-height:300px;
}

/* Buttons */

.button-group{

    display:flex;
    justify-content:center;
    margin:40px 0;

}

.button-group .btn{

    min-width:180px;
    padding:12px 30px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;

}

/* Mobile */

@media(max-width:768px){

h1{
    font-size:32px;
}

.card{
    margin-bottom:20px;
}

.button-group .btn{
    width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<h1>
📊 Overall Analytics Dashboard
</h1>

<div class="row g-4">

<div class="col-md-3">

<div class="card total-card text-center p-3">

<h5>Total Habits</h5>

<h2>{{ total }}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card completed-card text-center p-3">

<h5>Completed</h5>

<h2 class="text-success">

{{ completed }}

</h2>

</div>

</div>

<div class="col-md-3">

<div class="card pending-card text-center p-3">

<h5>Pending</h5>

<h2 class="text-warning">

{{ pending }}

</h2>

</div>

</div>

<div class="col-md-3">

<div class="card missed-card text-center p-3">

<h5>Missed</h5>

<h2 class="text-danger">

{{ missed }}

</h2>

</div>

</div>

</div>

<br>

<div class="card chart-card p-4">

<h3>

Overall Success Rate

</h3>

<div class="progress">

<div class="progress-bar bg-success"

style="width:{{ success_rate }}%;">

{{ success_rate }}%

</div>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<div class="card chart-card p-4">

<h4 class="text-center">

🥧 Habit Status

</h4>

<canvas id="pieChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card chart-card p-4">

<h4 class="text-center">

📊 Habit Comparison

</h4>

<canvas id="barChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card chart-card p-4">

<h4 class="text-center">

📅 Date Wise Progress

</h4>

<canvas id="dateChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card chart-card p-4">

<h4 class="text-center">

📈 Weekly Progress

</h4>

<canvas id="weeklyChart"></canvas>

</div>

</div>

</div>

<div class="button-group">

<a href="/dashboard/"
class="btn btn-primary">

⬅ Back

</a>

</div>

</div>

<script>

new Chart(document.getElementById('pieChart'),{

type:'pie',

data:{

labels:['Completed','Pending','Missed'],

datasets:[{

data:[

{{ completed }},

{{ pending }},

{{ missed }}

],

backgroundColor:[

'#22c55e',

'#facc15',

'#ef4444'

]

}]

}

});

new Chart(document.getElementById('barChart'),{

type:'bar',

data:{

labels:['Completed','Pending','Missed'],

datasets:[{

label:'Habits',

data:[

{{ completed }},

{{ pending }},

{{ missed }}

],

backgroundColor:[

'#22c55e',

'#facc15',

'#ef4444'

]

}]

}

});

new Chart(document.getElementById('dateChart'),{

type:'line',

data:{

labels:{{ date_labels|safe }},

datasets:[{

label:'Completed Habits',

data:{{ date_counts|safe }},

borderColor:'#2563eb',

backgroundColor:'rgba(37,99,235,.2)',

fill:true,

tension:.4

}]

}

});

new Chart(document.getElementById('weeklyChart'),{

type:'bar',

data:{

labels:['Week 1','Week 2','Week 3','Week 4'],

datasets:[{

label:'Completed',

data:{{ weekly_counts|safe }},

backgroundColor:[

'#3b82f6',

'#22c55e',

'#f59e0b',

'#ef4444'

]

}]

}

});

</script>

</body>

</html>
