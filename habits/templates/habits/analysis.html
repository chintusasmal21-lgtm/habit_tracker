<!DOCTYPE html>
<html>

<head>

<title>Overall Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .card canvas{
    max-height:300px;
}
</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">
Overall Analytics Dashboard
</h1>

<div class="row">

<div class="col-md-3">
<div class="card p-3 text-center shadow">

<h5>Total Habits</h5>

<h2>{{ total }}</h2>

</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center shadow">

<h5>Completed</h5>

<h2 class="text-success">
{{ completed }}
</h2>

</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center shadow">

<h5>Pending</h5>

<h2 class="text-warning">
{{ pending }}
</h2>

</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center shadow">

<h5>Missed</h5>

<h2 class="text-danger">
{{ missed }}
</h2>

</div>
</div>
 

</div>

<br>

<div class="card p-4 shadow">

<h3>Overall Success Rate</h3>

<div class="progress" style="height:30px">

<div class="progress-bar bg-success"
     style="width: {{ success_rate }}%">

{{ success_rate }}%

</div>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<div class="card p-3 shadow">

<h4 class="text-center">
Habit Status
</h4>

<canvas id="pieChart" width="230"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card p-3 shadow">

<h4 class="text-center">
Habit Comparison
</h4>

<canvas id="barChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card p-3 shadow">

<h4 class="text-center">
Date Wise Progress
</h4>

<canvas id="dateChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card p-3 shadow">

<h4 class="text-center">
Weekly Progress
</h4>

<canvas id="weeklyChart"></canvas>

</div>

</div>

</div>

</div>



<script>

// PIE CHART

new Chart(document.getElementById('pieChart'), {

type: 'pie',

data: {

labels: ['Completed','Pending','Missed'],

datasets: [{

data: [
{{ completed }},
{{ pending }},
{{ missed }}
],

backgroundColor: [
'#28a745',
'#ffc107',
'#dc3545'
]

}]

}

});


// BAR CHART

new Chart(document.getElementById('barChart'), {

type: 'bar',

data: {

labels: ['Completed','Pending','Missed'],

datasets: [{

label: 'Habits',

data: [
{{ completed }},
{{ pending }},
{{ missed }}
],

backgroundColor: [
'#28a745',
'#ffc107',
'#dc3545'
]

}]

}

});
new Chart(document.getElementById('dateChart'), {

type: 'line',

data: {

labels: {{ date_labels|safe }},

datasets: [{

label: 'Completed Habits',

data: {{ date_counts|safe }},

borderColor: '#0d6efd',

backgroundColor: 'rgba(13,110,253,0.2)',

fill: true,

tension: 0.4

}]

}

});
new Chart(document.getElementById('weeklyChart'), {

type: 'bar',

data: {

labels: ['Week 1','Week 2','Week 3','Week 4'],

datasets: [{

label: 'Completed Habits',

data: {{ weekly_counts|safe }},

backgroundColor: [
'#0d6efd',
'#198754',
'#ffc107',
'#dc3545'
]

}]

}

});

</script>

      <a href="{% url 'dashboard' %}"
         class="btn btn-secondary">

          Back

       </a>

</body>

</html>
