<!DOCTYPE html>
<html>

<head>

<title>Overall Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   BODY
========================= */

body {
    background: linear-gradient(135deg, #d4fc79, #96e6a1);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
}


/* =========================
   CONTAINER
========================= */

.container {
    margin-top: 40px;
}


/* =========================
   MAIN HEADING
========================= */

h1 {
    text-align: center;
    font-size: 45px;
    font-weight: bold;
    color: #1f2937;
    margin-bottom: 35px;
}


/* =========================
   GENERAL CARDS
========================= */

.card {
    border: none;
    border-radius: 20px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, .15);
    transition: .3s;
}

.card:hover {
    transform: translateY(-6px);
}


/* =========================
   STATISTIC CARDS
========================= */

.total-card {
    background: #dbeafe;
}

.completed-card {
    background: #dcfce7;
}

.pending-card {
    background: #fef9c3;
}

.missed-card {
    background: #fee2e2;
}

.card h5 {
    font-weight: bold;
    color: #555;
}

.card h2 {
    font-size: 40px;
    font-weight: bold;
}


/* =========================
   CHART CARDS
========================= */

.chart-card {
    background: #ffffff;

    border-radius: 20px;

    padding: 20px !important;

    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);

    /* Same height for all chart boxes */
    height: 100%;

    min-height: 320px;

    margin-bottom: 20px;

    display: flex;
    flex-direction: column;
}


/* Chart title */

.chart-card h4 {
    font-size: 20px;
    font-weight: bold;

    margin-bottom: 15px;

    text-align: center;

    color: #222;
}


/* Chart area */

.chart-card canvas {
    width: 100% !important;

    height: 230px !important;

    max-height: none !important;

    display: block;
}


/* =========================
   PROGRESS
========================= */

.progress {
    height: 30px;
    border-radius: 20px;
}

.progress-bar {
    font-size: 18px;
    font-weight: bold;
}


/* =========================
   BUTTONS
========================= */

.button-group {
    display: flex;

    justify-content: center;

    align-items: center;

    gap: 15px;

    margin: 40px 0;
}

.button-group .btn {
    min-width: 180px;

    padding: 12px 30px;

    border-radius: 12px;

    font-size: 18px;

    font-weight: bold;
}


/* =========================
   MOBILE
========================= */

@media (max-width: 768px) {

    /* Main heading */

    h1 {
        font-size: 32px;

        margin-bottom: 25px;
    }


    /* General cards */

    .card {
        margin-bottom: 20px;
    }


    /* Chart cards */

    .chart-card {
        min-height: 280px;

        padding: 15px !important;

        margin-bottom: 15px;

        border-radius: 18px;
    }


    /* Chart titles */

    .chart-card h4 {
        font-size: 16px;

        margin-bottom: 10px;

        white-space: nowrap;
    }


    /* All charts same size */

    .chart-card canvas {
        width: 100% !important;

        height: 210px !important;

        max-height: none !important;
    }


    /* Buttons */

    .button-group {
        flex-direction: column;

        gap: 12px;

        margin: 30px 0;
    }


    .button-group .btn {
        width: 100%;

        min-width: 0;

        font-size: 16px;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>
📊 Overall Analytics Dashboard
</h1>

<div class="row g-4">

<div class="col-md-3">

<div class="card total-card text-center p-3">

<h5>Total Habits</h5>

<h2>{{ total }}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card completed-card text-center p-3">

<h5>Completed</h5>

<h2 class="text-success">

{{ completed }}

</h2>

</div>

</div>

<div class="col-md-3">

<div class="card pending-card text-center p-3">

<h5>Pending</h5>

<h2 class="text-warning">

{{ pending }}

</h2>

</div>

</div>

<div class="col-md-3">

<div class="card missed-card text-center p-3">

<h5>Missed</h5>

<h2 class="text-danger">

{{ missed }}

</h2>

</div>

</div>

</div>

<br>

<div class="card chart-card p-4">

<h3>

Overall Success Rate

</h3>

<div class="progress">

<div class="progress-bar bg-success"

style="width:{{ success_rate }}%;">

{{ success_rate }}%

</div>

</div>

</div>

<br>

<div class="row g-3">

    <div class="col-12 col-md-6">
        <div class="card chart-card">

            <h4>🥧 Habit Status</h4>

            <canvas id="pieChart"></canvas>

        </div>
    </div>


    <div class="col-12 col-md-6">
        <div class="card chart-card">

            <h4>📊 Habit Comparison</h4>

            <canvas id="barChart"></canvas>

        </div>
    </div>


    <div class="col-12 col-md-6">
        <div class="card chart-card">

            <h4>📅 Date Wise Progress</h4>

            <canvas id="dateChart"></canvas>

        </div>
    </div>


    <div class="col-12 col-md-6">
        <div class="card chart-card">

            <h4>📈 Weekly Progress</h4>

            <canvas id="weeklyChart"></canvas>

        </div>
    </div>

</div>
</div>

<div class="button-group">

<a href="/dashboard/"
class="btn btn-primary">

⬅ Back

</a>

</div>

</div>

<script>

new Chart(document.getElementById('pieChart'),{

type:'pie',

data:{

labels:['Completed','Pending','Missed'],

datasets:[{

data:[

{{ completed }},

{{ pending }},

{{ missed }}

],

backgroundColor:[

'#22c55e',

'#facc15',

'#ef4444'

]

}]

}

});

new Chart(document.getElementById('barChart'),{

type:'bar',

data:{

labels:['Completed','Pending','Missed'],

datasets:[{

label:'Habits',

data:[

{{ completed }},

{{ pending }},

{{ missed }}

],

backgroundColor:[

'#22c55e',

'#facc15',

'#ef4444'

]

}]

}

});

new Chart(document.getElementById('dateChart'),{

type:'line',

data:{

labels:{{ date_labels|safe }},

datasets:[{

label:'Completed Habits',

data:{{ date_counts|safe }},

borderColor:'#2563eb',

backgroundColor:'rgba(37,99,235,.2)',

fill:true,

tension:.4

}]

}

});

new Chart(document.getElementById('weeklyChart'),{

type:'bar',

data:{

labels:['Week 1','Week 2','Week 3','Week 4'],

datasets:[{

label:'Completed',

data:{{ weekly_counts|safe }},

backgroundColor:[

'#3b82f6',

'#22c55e',

'#f59e0b',

'#ef4444'

]

}]

}

});

</script>

</body>

</html>
