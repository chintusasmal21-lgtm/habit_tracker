<!DOCTYPE html>
<html>
<head>

<title>BMI Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#eef2ff,#dce7ff,#f7f9ff);
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container{
   max-width:800px;
}

.card{
    border:none;
    border-radius:25px;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
    padding:50px;
    width:100%;
    max-width:700px;
}

.heading{

font-size:40px;

font-weight:bold;

text-align:center;

color:#003cff;

margin-bottom:30px;

}

.form-control{

height:55px;

border-radius:15px;

font-size:18px;

}

.btn-primary{

width:100%;

height:55px;

border-radius:15px;

font-size:20px;

font-weight:bold;

}

.result{

margin-top:30px;

text-align:center;

}

.circle{

width:170px;

height:170px;

border-radius:50%;

background:#003cff;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

color:white;

font-size:40px;

font-weight:bold;

}

.status{

font-size:28px;

font-weight:bold;

margin-top:20px;

}

table{

margin-top:25px;

}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-10 col-lg-8">

<div class="card">

<div class="heading">

💚 BMI Calculator

</div>

<form method="POST">

{% csrf_token %}

<label>

Height (cm)

</label>

<input
type="number"
step="0.1"
name="height"
class="form-control"
placeholder="Enter Height"
required>

<br>

<label>

Weight (kg)

</label>

<input
type="number"
step="0.1"
name="weight"
class="form-control"
placeholder="Enter Weight"
required>

<br>

<button class="btn btn-primary">

Calculate BMI

</button>

</form>

{% if bmi %}

<div class="result">

<div class="circle">

{{ bmi }}

</div>

<div class="status">

{{ status }}

</div>

<table class="table table-bordered">

<tr>

<th>BMI Range</th>

<th>Status</th>

</tr>

<tr>

<td>Below 18.5</td>

<td>Underweight</td>

</tr>

<tr>

<td>18.5 - 24.9</td>

<td>Normal</td>

</tr>

<tr>

<td>25 - 29.9</td>

<td>Overweight</td>

</tr>

<tr>

<td>30+</td>

<td>Obese</td>

</tr>

</table>

</div>

{% endif %}

</div>

</div>

</div>

</div>

</body>

</html>
