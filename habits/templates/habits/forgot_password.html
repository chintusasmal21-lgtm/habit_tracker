
{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    background:url("{% static 'image/log.jpg' %}") center center/cover no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    position:relative;

}

body::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.35);

    backdrop-filter:blur(4px);

}

.forgot-box{

    position:relative;

    width:100%;
    max-width:700px;

    padding:60px 50px;

    border-radius:30px;

    background:rgba(255,255,255,.18);

    border:1px solid rgba(255,255,255,.25);

    backdrop-filter:blur(20px);

    box-shadow:0 20px 40px rgba(0,0,0,.35);

  

    z-index:1;

}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.lock-icon{

     width:110px;
    height:110px;

    font-size:50px;

    margin-bottom:30px;

}

h2{

    text-align:center;

    color:white;

    font-size:42px;
    font-weight:700;

    margin-bottom:15px;

}

.info{

    text-align:center;

    color:#f5f5f5;
    font-size:20px;

    line-height:28px;

    margin-bottom:30px;

}

.form-label{

    color:white;

    font-weight:600;

}

.form-control{

    height:60px;
    font-size:18px;
    border-radius:18px;
    padding:15px 20px;

}

.form-control:focus{

    box-shadow:0 0 15px rgba(37,99,235,.4);

    border:none;

}

.btn-send{

   width:100%;
    height:60px;
    font-size:20px;
    border-radius:50px;

}

.btn-send:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 20px rgba(37,99,235,.4);

}

.back-link{

    text-align:center;

    margin-top:20px;

}

.back-link a{

    color:white;

    text-decoration:none;

    font-weight:600;

}

.back-link a:hover{

    color:#06b6d4;

}

@media (max-width:576px){

    .forgot-box{

        padding:30px 22px;

        border-radius:20px;

    }

    h2{

        font-size:28px;

    }

    .lock-icon{

        width:75px;
        height:75px;

        font-size:32px;

    }

}

</style>

</head>

<body>

<div class="forgot-box">

    <button type="submit" class="btn btn-send">
        <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>

    <h2>Forgot Password?</h2>


   <p class="info">
      🔐 Don't worry! Enter your registered email address and we'll help you securely reset your password.
   </p>
    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Email Address
            </label>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter your email"
                   required>

        </div>

        <button type="submit"
                class="btn btn-send w-100">

            Send Reset Link

        </button>

    </form>

    <div class="back-link">

        <a href="/login/">

            ← Back To Login

        </a>

    </div>

</div>

</body>
</html>
