
{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    background:url("{% static 'image/log.jpg' %}") center/cover no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

}

body::before{

    content:"";

    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.35);

    backdrop-filter:blur(4px);

}

.forgot-box{

    position:relative;
    

    width:90%;
    max-width: 580px;

    padding:55%;

    border-radius:25px;

    background:rgba(255,255,255,.18);

    border:1px solid rgba(255,255,255,.25);

    backdrop-filter:blur(20px);

    box-shadow:0 20px 40px rgba(0,0,0,.35);

    animation:fadeIn .8s ease;

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(30px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

.lock-icon{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:42px;

    color:white;

    background:linear-gradient(135deg,#2563eb,#06b6d4);

    box-shadow:0 10px 25px rgba(37,99,235,.4);

    margin-bottom:25px;

}

h2{

    text-align:center;

    color:white;

    font-weight:bold;

}

.info{

    text-align:center;

    color:#f1f1f1;

    margin-top:10px;
    margin-bottom:30px;

}

.form-label{

    color:white;

    font-weight:600;

}

.form-control{

    border-radius:15px;

    padding:12px;

    border:none;

    background:rgba(255,255,255,.9);

    transition:.3s;

}

.form-control:focus{

    box-shadow:0 0 15px rgba(37,99,235,.4);

    transform:scale(1.02);

}

.btn-send{

    width:100%;

    padding:13px;

    border:none;

    border-radius:50px;

    font-weight:bold;

    color:white;

    background:linear-gradient(90deg,#06b6d4,#2563eb);

    transition:.3s;

}

.btn-send:hover{

    transform:translateY(-3px);

    box-shadow:0 12px 25px rgba(37,99,235,.4);

}

.back-link{

    text-align:center;

    margin-top:20px;

}

.back-link a{

    color:white;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}

.back-link a:hover{

    color:#06b6d4;

}

</style>

</head>

<body>

<div class="forgot-box">

    <button type="submit" class="btn btn-send">
        <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>

    <h2>Forgot Password?</h2>


   <p class="info">
      🔐 Don't worry! Enter your registered email address and we'll help you securely reset your password.
   </p>
    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Email Address
            </label>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter your email"
                   required>

        </div>

        <button type="submit"
                class="btn btn-send w-100">

            Send Reset Link

        </button>

    </form>

    <div class="back-link">

        <a href="/login/">

            ← Back To Login

        </a>

    </div>

</div>

</body>
</html>
