
{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{

    background-image:url("{% static 'image/log.jpg' %}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.forgot-box{

    width:450px;

    background:rgba(255,255,255,0.95);

    padding:40px;

    border-radius:25px;

    box-shadow:0 10px 30px rgba(0,0,0,.25);

    backdrop-filter:blur(10px);
}

.lock-icon{

    text-align:center;
    font-size:60px;

    color:#0d6efd;

    margin-bottom:15px;
}

h2{

    text-align:center;

    color:#001f8f;

    font-weight:bold;
}

.info{

    text-align:center;

    color:#666;

    margin-bottom:25px;
}

.btn-send{

    background:linear-gradient(
    135deg,
    #0d6efd,
    #001f8f
    );

    color:white;

    border:none;

    padding:12px;

    font-weight:bold;
}

.btn-send:hover{

    transform:translateY(-2px);

    color:white;
}

.back-link{

    text-align:center;

    margin-top:15px;
}

.back-link a{

    text-decoration:none;
}

</style>

</head>

<body>

<div class="forgot-box">

    <div class="lock-icon">

        <i class="fas fa-lock"></i>

    </div>

    <h2>Forgot Password?</h2>

    <p class="info">

        Enter your registered email address.
        We'll help you reset your password.

    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Email Address
            </label>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter your email"
                   required>

        </div>

        <button type="submit"
                class="btn btn-send w-100">

            Send Reset Link

        </button>

    </form>

    <div class="back-link">

        <a href="/login/">

            ← Back To Login

        </a>

    </div>

</div>

</body>
</html>
