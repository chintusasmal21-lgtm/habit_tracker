{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            background:url("{% static 'image/log.jpg' %}")
            center center/cover no-repeat;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:20px;

            position:relative;

        }

        /* Dark overlay */

        body::before{

            content:"";

            position:absolute;

            top:0;
            left:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,.35);

            backdrop-filter:blur(4px);

        }

        /* Forgot Password Card */

        .forgot-box{

            position:relative;

            width:100%;
            max-width:600px;

            padding:50px 45px;

            border-radius:30px;

            background:rgba(255,255,255,.18);

            border:1px solid rgba(255,255,255,.25);

            backdrop-filter:blur(20px);

            box-shadow:0 20px 40px rgba(0,0,0,.35);

            z-index:1;

            animation:fadeIn .7s ease;

        }

        /* Animation */

        @keyframes fadeIn{

            from{

                opacity:0;
                transform:translateY(30px);

            }

            to{

                opacity:1;
                transform:translateY(0);

            }

        }

        /* Lock Icon */

        .lock-icon{

            width:90px;
            height:90px;

            margin:0 auto 25px;

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:40px;

            color:white;

            background:linear-gradient(
                135deg,
                #2563eb,
                #06b6d4
            );

            box-shadow:
                0 10px 25px
                rgba(37,99,235,.4);

        }

        /* Heading */

        h2{

            text-align:center;

            color:white;

            font-size:42px;

            font-weight:700;

            margin-bottom:15px;

        }

        /* Description */

        .info{

            text-align:center;

            color:#f5f5f5;

            font-size:18px;

            line-height:30px;

            margin-bottom:35px;

        }

        /* Label */

        .form-label{

            color:white;

            font-weight:600;

            margin-bottom:8px;

        }

        /* Input */

        .form-control{

            height:58px;

            font-size:17px;

            border-radius:18px;

            padding:15px 20px;

            border:none;

        }

        .form-control:focus{

            box-shadow:
                0 0 15px
                rgba(37,99,235,.5);

            outline:none;

        }

        /* Send OTP Button */

        .btn-send{

            width:100%;

            height:55px;

            border:none;

            border-radius:50px;

            font-size:17px;

            font-weight:bold;

            color:white;

            background:
                linear-gradient(
                    90deg,
                    #06b6d4,
                    #2563eb
                );

            transition:.3s;

        }

        .btn-send:hover{

            transform:translateY(-3px);

            box-shadow:
                0 10px 20px
                rgba(37,99,235,.4);

        }

        /* Error */

        .alert{

            border-radius:15px;

            font-weight:600;

        }

        /* Back Link */

        .back-link{

            text-align:center;

            margin-top:25px;

        }

        .back-link a{

            color:white;

            text-decoration:none;

            font-weight:600;

            font-size:16px;

        }

        .back-link a:hover{

            color:#06b6d4;

        }

        /* Mobile */

        @media (max-width:576px){

            body{

                padding:15px;

            }

            .forgot-box{

                padding:35px 22px;

                border-radius:22px;

            }

            h2{

                font-size:28px;

            }

            .info{

                font-size:15px;

                line-height:24px;

            }

            .lock-icon{

                width:75px;

                height:75px;

                font-size:32px;

            }

            .form-control{

                height:52px;

                font-size:16px;

            }

            .btn-send{

                height:52px;

                font-size:16px;

            }

        }

    </style>

</head>


<body>


<div class="forgot-box">


    <!-- Lock Icon -->

    <div class="lock-icon">

        <i class="fas fa-lock"></i>

    </div>


    <!-- Heading -->

    <h2>
        Forgot Password?
    </h2>


    <!-- Description -->

    <p class="info">

        🔐 Don't worry! Enter your registered email address
        and we'll send you a secure OTP to reset your password.

    </p>


    <!-- Error Message -->

    {% if error %}

        <div class="alert alert-danger text-center">

            {{ error }}

        </div>

    {% endif %}


    <!-- Forgot Password Form -->

    <form method="POST">

        {% csrf_token %}


        <div class="mb-4">

            <label class="form-label">

                <i class="fas fa-envelope"></i>
                Email Address

            </label>


            <input type="email"

                   name="email"

                   class="form-control"

                   placeholder="Enter your registered email"

                   autocomplete="email"

                   required>

        </div>


        <!-- Send OTP -->

        <button type="submit"
                class="btn btn-send">

            <i class="fas fa-paper-plane"></i>

            Send OTP

        </button>


    </form>


    <!-- Back To Login -->

    <div class="back-link">

        <a href="{% url 'login' %}">

            <i class="fas fa-arrow-left"></i>

            Back To Login

        </a>

    </div>


</div>


</body>

</html>
